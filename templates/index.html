<!-- Doctor Panel -->
<div id="doctor-panel" class="hidden doctor-panel">
    <img src="/static/doctor-writing.png" class="doctor-img">
    <div class="writing-status">✍️ Preparing Medical Report...</div>
</div>

<style>
.doctor-panel{
    position:fixed;
    bottom:20px;
    right:20px;
    width:320px;
    z-index:9999;
    animation:doctorEnter .8s ease;
}
.doctor-img{
    width:100%;
    border-radius:20px;
    box-shadow:0 0 30px rgba(6,182,212,.3);
}
.writing-status{
    margin-top:10px;
    text-align:center;
    color:#06B6D4;
    font-weight:bold;
}
@keyframes doctorEnter{
    from{transform:translateX(400px);opacity:0;}
    to{transform:translateX(0);opacity:1;}
}
</style>

<script>
// Before API call:
document.getElementById("doctor-panel").classList.remove("hidden");

// After diagnosis received:
document.getElementById("doctor-panel").classList.add("hidden");
</script>
